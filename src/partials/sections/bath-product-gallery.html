<section class="series-content bath-product-gallery" aria-labelledby="bath-product-gallery-title">
  <div class="container">
    <div class="series-content__gallery article-body__gallery-block" id="bath-product-toc-gallery" aria-labelledby="bath-product-gallery-title">
      <div class="section-head article-body__gallery-head">
        <span class="section-head__line section-head__line--left"></span>
        <h2 class="section-head__title" id="bath-product-gallery-title">Галерея</h2>
        <span class="section-head__line section-head__line--right"></span>
      </div>
      <div class="article-body__gallery-slider swiper" data-article-gallery-swiper>
        <div class="swiper-wrapper">
          <figure class="swiper-slide article-body__gallery-card">
            <picture>
              <source srcset="img/article/article-body-hero.webp" type="image/webp">
              <img src="img/article/article-body-hero.png" width="342" height="350" loading="lazy" alt="">
            </picture>
            <figcaption>Подпись к картинке</figcaption>
          </figure>
          <figure class="swiper-slide article-body__gallery-card">
            <picture>
              <source srcset="img/academy/academy-1.webp" type="image/webp">
              <img src="img/academy/academy-1.png" width="342" height="350" loading="lazy" alt="">
            </picture>
            <figcaption>Подпись к картинке</figcaption>
          </figure>
          <figure class="swiper-slide article-body__gallery-card">
            <picture>
              <source srcset="img/academy/academy-2.webp" type="image/webp">
              <img src="img/academy/academy-2.png" width="342" height="350" loading="lazy" alt="">
            </picture>
            <figcaption>Подпись к картинке</figcaption>
          </figure>
          <figure class="swiper-slide article-body__gallery-card">
            <picture>
              <source srcset="img/home/product-chimney.webp" type="image/webp">
              <img src="img/home/product-chimney.png" width="342" height="350" loading="lazy" alt="">
            </picture>
            <figcaption>Подпись к картинке</figcaption>
          </figure>
        </div>
      </div>
      <div class="article-body__gallery-controls">
        <button class="btn-reset article-body__gallery-nav article-body__gallery-nav--prev" type="button" aria-label="Предыдущий слайд"></button>
        <div class="article-body__gallery-counter"><span data-gallery-current>01</span>/<span data-gallery-total>04</span></div>
        <button class="btn-reset article-body__gallery-nav article-body__gallery-nav--next" type="button" aria-label="Следующий слайд"></button>
      </div>
    </div>
  </div>
</section>
