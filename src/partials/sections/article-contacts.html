<section class="article-contacts" aria-labelledby="article-contacts-title">
  <div class="container">
    <div class="section-head">
      <span class="section-head__line section-head__line--left"></span>
      <h2 class="section-head__title" id="article-contacts-title">Контакты</h2>
      <span class="section-head__line section-head__line--right"></span>
    </div>
    <div class="article-contacts__stage">
      <div
        id="article-contacts-map"
        class="article-contacts__map"
        role="presentation"
        data-ymaps-role="contacts"
        data-ymaps-lat="56.331423"
        data-ymaps-lon="43.900887"
        data-ymaps-zoom="17"
        data-ymaps-balloon="Нижний Новгород, Сормовское шоссе, 1 Б, корпус 2"
      ></div>
      <div class="article-contacts__card">
        <div class="article-contacts__line article-contacts__line--address">
          <span class="article-contacts__label">
            <svg class="article-contacts__icon article-contacts__icon--pin" width="18" height="18" aria-hidden="true">
              <use href="img/sprite.svg#pin"></use>
            </svg>
            Адрес:
          </span>
          <span class="article-contacts__value">Нижний Новгород, Сормовское шоссе, 1&nbsp;Б, корпус&nbsp;2</span>
        </div>
        <div class="article-contacts__line article-contacts__line--mail">
          <span class="article-contacts__label">
            <svg class="article-contacts__icon article-contacts__icon--mail" width="21" height="17" aria-hidden="true">
              <use href="img/sprite.svg#mail"></use>
            </svg>
            Почта:
          </span>
          <a class="article-contacts__value article-contacts__value--link" href="mailto:BSinfo@mail.ru">BSinfo@mail.ru</a>
        </div>
        <div class="article-contacts__line article-contacts__line--hours">
          <span class="article-contacts__label">
            <svg class="article-contacts__icon article-contacts__icon--calendar" width="19" height="21" aria-hidden="true">
              <use href="img/sprite.svg#calendar-1"></use>
            </svg>
            График:
          </span>
          <span class="article-contacts__value">
            Понедельник&nbsp;— пятница с&nbsp;9:00 до&nbsp;18:00<br>
            Выходной: суббота, воскресенье
          </span>
        </div>
        <div class="article-contacts__phone-block">
          <div class="article-contacts__line article-contacts__line--phone">
            <span class="article-contacts__label">
              <svg class="article-contacts__icon article-contacts__icon--phone" width="18" height="18" aria-hidden="true">
                <use href="img/sprite.svg#phone"></use>
              </svg>
              Телефон:
            </span>
            <a class="article-contacts__value article-contacts__value--link" href="tel:88005005442">8&nbsp;(800) 500-54-42</a>
          </div>
          <p class="article-contacts__hint">Звонок по&nbsp;России бесплатный</p>
        </div>
        <a class="article-contacts__map-link" href="#article-contacts-map">Показать на&nbsp;карте</a>
      </div>
    </div>
  </div>
</section>
