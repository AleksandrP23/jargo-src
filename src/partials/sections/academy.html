<section class="academy">
  <div class="container">
    <div class="section-head">
      <span class="section-head__line section-head__line--left"></span>
      <h2 class="section-head__title"><span class="section-head__title--accent">Академия</span> ЖарGo</h2>
      <span class="section-head__line section-head__line--right"></span>
    </div>
    <div class="academy__grid">
      <article class="academy-video">
        <button
          class="academy-video__preview btn-reset"
          type="button"
          data-video-modal
          data-graph-path="video"
          data-video-src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
          aria-label="Открыть видео"
        >
          <picture>
            <source srcset="img/home/academy-video-preview.webp" type="image/webp">
            <img src="img/home/academy-video-preview.png" width="788" height="500" alt="">
          </picture>
          <span class="academy-video__play" aria-hidden="true"></span>
        </button>
        <div class="academy-video__meta">
          <h3>Название видео</h3>
          <span>5 мин</span>
        </div>
      </article>
      <div class="academy__aside">
        <div class="academy__cards">
          <a class="academy-card" href="#">
            <p class="academy-card__text">Основной фокус — надёжность, безопасность</p>
            <span class="academy-card__media">
              <picture>
                <source srcset="img/academy/academy-1.webp" type="image/webp">
                <img src="img/academy/academy-1.png" width="274" height="150" loading="lazy" alt="">
              </picture>
              <span class="academy-card__arrow" aria-hidden="true">
                <svg class="icon icon--arrow" width="24" height="24" aria-hidden="true">
                  <use href="img/sprite.svg#arrow"></use>

              </span>

          </a>

              <span class="academy-card__arrow" aria-hidden="true">

                    <use href="img/sprite.svg#logo-max"></use>
                  </svg>
                </a>
              </li>
              <li>
                <a href="#" aria-label="Telegram">
