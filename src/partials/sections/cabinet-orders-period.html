<form class="cabinet-order-period" action="#" method="get">
  <div class="cabinet-order-period__group">
    <span class="cabinet-order-period__label" id="cabinet-order-period-label">Период</span>
    <div class="cabinet-order-period__dates" role="group" aria-labelledby="cabinet-order-period-label">
      <input class="cabinet-order-period__input" type="text" name="date-from" value="01.01.2025" inputmode="numeric" autocomplete="off" aria-label="Дата начала периода">
      <span class="cabinet-order-period__dash" aria-hidden="true">-</span>
      <input class="cabinet-order-period__input" type="text" name="date-to" value="31.10.2025" inputmode="numeric" autocomplete="off" aria-label="Дата окончания периода">
    </div>
  </div>
  <div class="cabinet-order-period__actions">
    <button class="cabinet-order-period__submit btn-reset" type="submit">Показать</button>
    <button class="cabinet-order-period__reset btn-reset" type="reset">Сбросить</button>
  </div>
</form>
