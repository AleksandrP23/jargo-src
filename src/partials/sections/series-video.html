<section class="series-video" aria-labelledby="series-video-title">
  <div class="container">
    <div class="article-body__video-wrap">
      <article class="academy-video article-body__video academy-video--series-full">
        <button
          class="academy-video__preview btn-reset"
          type="button"
          data-video-modal
          data-graph-path="video"
          data-video-src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
          aria-label="Открыть видео"
        >
          <picture>
            <source srcset="img/home/academy-video-preview.webp" type="image/webp">
            <img src="img/home/academy-video-preview.png" width="1400" height="500" loading="lazy" alt="">
          </picture>
          <span class="academy-video__play" aria-hidden="true"></span>
        </button>
        <div class="academy-video__meta">
          <h3 id="series-video-title">Название видео</h3>
          <span>5 мин</span>
        </div>
      </article>
    </div>
  </div>
</section>
